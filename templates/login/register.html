{% extends 'layout/layout.html' %}
    {%block content%}
    <form class="login_r" action="{% url 'register' %}" method="POST">
        {% csrf_token %}
        <div class="login__field" >
            <i class="login__icon fas "><img src="static/file-person.svg" alt="">
            </i>
            <input type="text" name="first_name" class="login__input" placeholder="first name">
        </div>
        <div class="login__field" >
            <i class="login__icon fas "><img src="static/file-person.svg" alt="">
            </i>
            <input type="text" name="last_name" class="login__input" placeholder="last name">
        </div>
        <div class="login__field" >
            <i class="login__icon fas "><img src="static/file-person.svg" alt="">
            </i>
            <input type="text" name="username" class="login__input" placeholder="User name">
        </div>
        <div class="login__field">
            <i class="login__icon fas "><img src="static/file-person.svg" alt="">
            </i>
            <input type="text" name="email" class="login__input" placeholder="email">
        </div>
        <div class="login__field">
            <i class="login__icon fas "><img src="static/shield-lock-fill.svg" alt=""></i>
            <input type="text" name="password1" class="login__input" placeholder="password1">
        </div>
        <div class="login__field" >
            <i class="login__icon fas "><img src="static/shield-lock-fill.svg" alt=""></i>
            <input type="text" name="password2" class="login__input" placeholder="password2">
        </div>
        
        <button class="button login__register" type="submit">
            <span class="button__text">Register</span>
            <i class="button__icon fas "><img src="static/box-arrow-in-right.svg" alt=""></i>
        </button>				
        <h5 class="h6">Already have an account??</h5><br>
        <a href = "{% url 'login' %}">login Here</a> 
    </form>
    {% endblock %}
