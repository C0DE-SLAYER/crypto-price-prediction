{% extends 'layout/layout.html' %}
    {%block content%}
    <form class="login" action="{% url 'login' %}" method="POST">
        {% csrf_token %}
        <div class="login__field">
            <i class="login__icon fas "><img src="static/file-person.svg" alt="">
            </i>
            <input type="text" name="username" class="login__input" placeholder="User name">
        </div>
        <div class="login__field">
            <i class="login__icon fas "><img src="static/shield-lock-fill.svg" alt=""></i>
            <input type="text" name="password" class="login__input" placeholder="password">
        </div>
        <button class="button login__submit" type="submit">
            <span class="button__text">Log In Now</span>
            <i class="button__icon fas "><img src="static/box-arrow-in-right.svg" alt=""></i>
        </button>				
        <br>
        <h5 class="h6">Dont have an account??</h5><br>
        <a href = "{% url 'register' %}">SignUp Here</a> 
    </form>
    {%endblock%}
